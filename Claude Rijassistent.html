<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude — Rijassistent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text-dim: #666;
    --text-muted: #444;
    --accent: #e8622a;
    --accent-glow: rgba(232, 98, 42, 0.15);
    --green: #3ddc84;
    --blue: #4a9eff;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .logo-text { font-size: 15px; font-weight: 500; letter-spacing: 0.5px; }
  .logo-text span { color: var(--text-dim); font-weight: 300; }
  .status-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--text-dim); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); }
  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: none;
  }
  .conversation::-webkit-scrollbar { display: none; }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 40px;
    margin: auto;
  }
  .empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 4px; }
  .empty-title { font-size: 15px; color: var(--text-dim); }
  .empty-sub { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 240px; }
  .message { display: flex; flex-direction: column; gap: 4px; animation: fadeSlide 0.25s ease; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-items: flex-end; }
  .message.assistant { align-items: flex-start; }
  .message-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; padding: 0 4px; }
  .bubble { max-width: 85%; padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.55; }
  .message.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .message.assistant .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .thinking-dots { display: flex; gap: 4px; padding: 4px 0; }
  .thinking-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }
  .controls {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .waveform { display: flex; align-items: center; gap: 3px; height: 28px; opacity: 0; transition: opacity 0.3s; }
  .waveform.active { opacity: 1; }
  .wave-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: wave 0.8s ease-in-out infinite; height: 4px; }
  .wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:0.1s}.wave-bar:nth-child(3){animation-delay:0.2s}.wave-bar:nth-child(4){animation-delay:0.3s}.wave-bar:nth-child(5){animation-delay:0.4s}.wave-bar:nth-child(6){animation-delay:0.3s}.wave-bar:nth-child(7){animation-delay:0.2s}.wave-bar:nth-child(8){animation-delay:0.1s}.wave-bar:nth-child(9){animation-delay:0s}
  @keyframes wave { 0%,100%{height:4px} 50%{height:20px} }
  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); transition: transform 0.15s ease;
    -webkit-tap-highlight-color: transparent; outline: none;
  }
  .mic-btn:active { transform: scale(0.94); }
  .mic-btn.listening {
    background: var(--accent); border-color: var(--accent);
    animation: pulse-ring 1.5s ease infinite;
  }
  .mic-btn.processing { border-color: var(--blue); }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 16px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .mic-icon { font-size: 28px; }
  .mic-btn.processing .mic-icon { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .mic-hint { font-size: 11px; color: var(--text-muted); height: 16px; text-align: center; }
  .mic-hint.active { color: var(--accent); }
  .quick-actions { display: flex; gap: 8px; width: 100%; }
  .quick-btn {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 6px; color: var(--text-dim); font-size: 11px; font-family: inherit;
    cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center;
    gap: 3px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; outline: none;
  }
  .quick-btn:active { background: var(--surface2); border-color: var(--accent); color: var(--text); }
  .quick-btn .qicon { font-size: 14px; }
  .api-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .api-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
    padding: 28px 24px; max-width: 320px; width: 90%; display: flex; flex-direction: column; gap: 16px;
  }
  .api-title { font-size: 16px; font-weight: 500; }
  .api-sub { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .api-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; color: var(--text); font-family: inherit; font-size: 13px;
    outline: none; width: 100%; transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-btn {
    background: var(--accent); border: none; border-radius: 10px; padding: 12px;
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .toast {
    position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #2a1515; border: 1px solid #5a2020; border-radius: 10px;
    padding: 10px 16px; font-size: 12px; color: #ff6b6b;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="api-overlay" id="apiOverlay">
  <div class="api-card">
    <div class="logo-dot" style="width:10px;height:10px"></div>
    <div class="api-title">Claude Rijassistent</div>
    <div class="api-sub">Voer je Anthropic API-sleutel in om te starten. Deze wordt lokaal opgeslagen in je browser.</div>
    <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <button class="api-btn" onclick="saveApiKey()">Starten →</button>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <div class="logo-text">Claude <span>/ rijmodus</span></div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    <span id="statusText">gereed</span>
  </div>
</div>

<div class="conversation" id="conversation">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎙️</div>
    <div class="empty-title">Klaar om te luisteren</div>
    <div class="empty-sub">Druk de knop in en spreek je opdracht. Claude antwoordt via de speakers.</div>
  </div>
</div>

<div class="controls">
  <div class="waveform" id="waveform">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggleListening()">
    <span class="mic-icon" id="micIcon">🎙️</span>
  </button>

  <div class="mic-hint" id="micHint">Druk om te spreken</div>

  <div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('Ik wil een afspraak inplannen')">
      <span class="qicon">📅</span><span>Agenda</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('Maak een verslag van de vergadering die ik ga dicteren')">
      <span class="qicon">📋</span><span>Verslag</span>
    </button>
    <button class="quick-btn" onclick="sendQuick('Help me met een stukje code')">
      <span class="qicon">💻</span><span>Code</span>
    </button>
    <button class="quick-btn" onclick="clearConversation()">
      <span class="qicon">🗑️</span><span>Wissen</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let apiKey = localStorage.getItem('claude_api_key') || '';
  let recognition = null;
  let isListening = false;
  let isProcessing = false;
  let conversationHistory = [];

  if (apiKey) document.getElementById('apiOverlay').style.display = 'none';

  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val.startsWith('sk-')) { showToast('Ongeldige sleutel — moet beginnen met sk-'); return; }
    apiKey = val;
    localStorage.setItem('claude_api_key', val);
    document.getElementById('apiOverlay').style.display = 'none';
  }

  function setupRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('Spraakherkenning niet beschikbaar'); return null; }
    const r = new SR();
    r.lang = 'nl-NL';
    r.continuous = false;
    r.interimResults = false;
    r.onresult = (e) => { stopListening(); handleUserInput(e.results[0][0].transcript); };
    r.onerror = (e) => { stopListening(); if (e.error !== 'aborted') showToast('Fout: ' + e.error); };
    r.onend = () => { if (isListening) stopListening(); };
    return r;
  }

  function toggleListening() {
    if (isProcessing) return;
    isListening ? stopListening() : startListening();
  }

  function startListening() {
    window.speechSynthesis && window.speechSynthesis.cancel();
    recognition = setupRecognition();
    if (!recognition) return;
    isListening = true;
    recognition.start();
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micHint').classList.add('active');
    document.getElementById('micHint').textContent = 'Luisteren… druk om te stoppen';
    document.getElementById('waveform').classList.add('active');
    document.getElementById('micIcon').textContent = '⏹️';
    document.getElementById('statusText').textContent = 'luisteren';
  }

  function stopListening() {
    isListening = false;
    if (recognition) { recognition.abort(); recognition = null; }
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micHint').classList.remove('active');
    document.getElementById('micHint').textContent = 'Druk om te spreken';
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('micIcon').textContent = '🎙️';
    document.getElementById('statusText').textContent = 'gereed';
  }

  function setProcessing(val) {
    isProcessing = val;
    const btn = document.getElementById('micBtn');
    const icon = document.getElementById('micIcon');
    const hint = document.getElementById('micHint');
    if (val) {
      btn.classList.add('processing');
      icon.textContent = '⚙️';
      hint.textContent = 'Nadenken…';
      document.getElementById('statusText').textContent = 'verwerken';
    } else {
      btn.classList.remove('processing');
      icon.textContent = '🎙️';
      hint.textContent = 'Druk om te spreken';
      document.getElementById('statusText').textContent = 'gereed';
    }
  }

  async function handleUserInput(text) {
    if (!text.trim()) return;
    hideEmptyState();
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    setProcessing(true);
    const thinkingEl = addThinking();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: 'Je bent een vriendelijke rijassistent in een Tesla. De gebruiker spreekt je aan terwijl hij rijdt. Antwoorden zijn altijd: kort (max 3 zinnen), direct bruikbaar, en in het Nederlands. Geen lange lijsten. Bevestig acties duidelijk. Stel één vervolgvraag als iets onduidelijk is.',
          messages: conversationHistory
        })
      });

      const data = await response.json();
      thinkingEl.remove();

      if (data.error) { showToast(data.error.message || 'API fout'); setProcessing(false); return; }

      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
      speak(reply);
    } catch (err) {
      thinkingEl.remove();
      showToast('Verbindingsfout — controleer internet');
    }

    setProcessing(false);
  }

  function sendQuick(text) { handleUserInput(text); }

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'nl-NL';
    utt.rate = 1.05;
    const voices = window.speechSynthesis.getVoices();
    const nlVoice = voices.find(v => v.lang.startsWith('nl'));
    if (nlVoice) utt.voice = nlVoice;
    window.speechSynthesis.speak(utt);
  }

  function addMessage(role, text) {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'jij' : 'claude';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(label);
    div.appendChild(bubble);
    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
    return div;
  }

  function addThinking() {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'message assistant';
    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'claude';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const dots = document.createElement('div');
    dots.className = 'thinking-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(dots);
    div.appendChild(label);
    div.appendChild(bubble);
    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
    return div;
  }

  function hideEmptyState() {
    const el = document.getElementById('emptyState');
    if (el) el.remove();
  }

  function clearConversation() {
    window.speechSynthesis && window.speechSynthesis.cancel();
    conversationHistory = [];
    document.getElementById('conversation').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎙️</div>
        <div class="empty-title">Klaar om te luisteren</div>
        <div class="empty-sub">Druk de knop in en spreek je opdracht. Claude antwoordt via de speakers.</div>
      </div>`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  window.speechSynthesis && (window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices());
</script>
</body>
</html>
