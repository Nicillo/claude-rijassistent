<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude — Rijassistent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text-dim: #666;
    --text-muted: #444;
    --accent: #e8622a;
    --accent-glow: rgba(232, 98, 42, 0.15);
    --green: #3ddc84;
    --blue: #4a9eff;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .logo-text { font-size: 15px; font-weight: 500; letter-spacing: 0.5px; }
  .logo-text span { color: var(--text-dim); font-weight: 300; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--text-dim); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); }
  .outlook-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; font-size: 11px; color: var(--text-dim); cursor: pointer;
    font-family: inherit; transition: all 0.2s; outline: none;
  }
  .outlook-btn:hover { border-color: var(--blue); color: var(--blue); }
  .outlook-btn.connected { color: var(--green); border-color: var(--green); }
  /* ── TL Log paneel ── */
  .tl-log-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; }
  .tl-log-panel { position: fixed; top: 0; right: 0; width: 380px; max-width: 100vw; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; }
  .tl-log-panel.open { transform: translateX(0); }
  .tl-log-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .tl-log-header h3 { font-size: 14px; font-weight: 600; margin: 0; }
  .tl-log-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; line-height: 1; }
  .tl-log-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .tl-log-empty { color: var(--text-dim); font-size: 13px; text-align: center; margin-top: 40px; }
  .tl-log-entry { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; }
  .tl-log-entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .tl-log-entry-info { flex: 1; }
  .tl-log-action { font-weight: 600; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tl-log-desc { color: var(--text); margin-top: 2px; line-height: 1.4; }
  .tl-log-time { color: var(--text-dim); font-size: 10px; white-space: nowrap; }
  .tl-log-undo { margin-top: 8px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 11px; padding: 4px 10px; cursor: pointer; width: 100%; }
  .tl-log-undo:hover { border-color: var(--accent); color: var(--accent); }
  .tl-log-undo:disabled { opacity: 0.4; cursor: default; }
  .tl-log-badge { position: relative; }
  .tl-log-badge-count { position: absolute; top: -4px; right: -4px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 4px; min-width: 14px; text-align: center; line-height: 14px; display: none; }
  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: none;
  }
  .conversation::-webkit-scrollbar { display: none; }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 40px;
    margin: auto;
  }
  .empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 4px; }
  .empty-title { font-size: 15px; color: var(--text-dim); }
  .empty-sub { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 240px; }
  .message { display: flex; flex-direction: column; gap: 4px; animation: fadeSlide 0.25s ease; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-items: flex-end; }
  .message.assistant { align-items: flex-start; }
  .message-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; padding: 0 4px; }
  .bubble { max-width: 85%; padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.55; }
  .message.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .message.assistant .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .thinking-dots { display: flex; gap: 4px; padding: 4px 0; }
  .thinking-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }
  .controls {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .waveform { display: flex; align-items: center; gap: 3px; height: 28px; opacity: 0; transition: opacity 0.3s; }
  .waveform.active { opacity: 1; }
  .wave-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: wave 0.8s ease-in-out infinite; height: 4px; }
  .wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:0.1s}.wave-bar:nth-child(3){animation-delay:0.2s}.wave-bar:nth-child(4){animation-delay:0.3s}.wave-bar:nth-child(5){animation-delay:0.4s}.wave-bar:nth-child(6){animation-delay:0.3s}.wave-bar:nth-child(7){animation-delay:0.2s}.wave-bar:nth-child(8){animation-delay:0.1s}.wave-bar:nth-child(9){animation-delay:0s}
  @keyframes wave { 0%,100%{height:4px} 50%{height:20px} }
  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); transition: transform 0.15s ease;
    -webkit-tap-highlight-color: transparent; outline: none;
  }
  .mic-btn:active { transform: scale(0.94); }
  .mic-btn.listening {
    background: var(--accent); border-color: var(--accent);
    animation: pulse-ring 1.5s ease infinite;
  }
  .mic-btn.processing { border-color: var(--blue); }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 16px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .mic-icon { font-size: 28px; }
  .mic-btn.processing .mic-icon { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .mic-hint { font-size: 11px; color: var(--text-muted); height: 16px; text-align: center; }
  .mic-hint.active { color: var(--accent); }
  /* ── Approval panel ── */
  .approval-panel {
    display: none; width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; flex-direction: column; gap: 10px;
  }
  .approval-panel.visible { display: flex; }
  .approval-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); }
  .approval-action { font-size: 13px; font-weight: 600; color: var(--accent); }
  .approval-details { font-size: 11px; color: var(--text); line-height: 1.7; }
  .approval-btns { display: flex; gap: 8px; }
  .approval-btn {
    flex: 1; border: none; border-radius: 10px; padding: 10px 8px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .approval-btn:active { opacity: 0.7; }
  .approval-btn.ok    { background: #1a4a2e; color: #3ddc84; border: 1px solid #3ddc84; }
  .approval-btn.nok   { background: #4a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b; }
  .approval-btn.edit  { background: #1a2a4a; color: #4a9eff; border: 1px solid #4a9eff; }
  /* ── Bottom bar knoppen ── */
  .bottom-bar { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
  .bottom-bar-btn {
    flex: 1; border-radius: 12px; padding: 12px 10px; font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; outline: none;
  }
  .bottom-bar-btn.approval { background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); }
  .bottom-bar-btn.approval:active { background: var(--accent); color: #fff; }
  .bottom-bar-btn.history { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .bottom-bar-btn.history:active { border-color: var(--blue); color: var(--blue); }
  /* ── Optie-chips ── */
  .option-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .option-chip {
    background: var(--surface2); border: 1px solid var(--blue); border-radius: 20px;
    padding: 6px 14px; color: var(--blue); font-size: 12px; font-family: inherit;
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s;
  }
  .option-chip:active { background: var(--blue); color: #fff; }
  .api-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .api-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
    padding: 28px 24px; max-width: 320px; width: 90%; display: flex; flex-direction: column; gap: 16px;
  }
  .api-title { font-size: 16px; font-weight: 500; }
  .api-sub { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .api-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; color: var(--text); font-family: inherit; font-size: 13px;
    outline: none; width: 100%; transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-btn {
    background: var(--accent); border: none; border-radius: 10px; padding: 12px;
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .toast {
    position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #2a1515; border: 1px solid #5a2020; border-radius: 10px;
    padding: 10px 16px; font-size: 12px; color: #ff6b6b;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Log paneel (tabs: Goedkeuringen / Verleden) -->
<div class="tl-log-overlay" id="tlLogOverlay" onclick="closeTlLog()"></div>
<div class="tl-log-panel" id="tlLogPanel">
  <div class="tl-log-header">
    <div style="display:flex;gap:0;flex:1;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      <button id="tabApproval" onclick="switchTab('approval')" style="flex:1;padding:7px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;">⏳ Goedkeuringen</button>
      <button id="tabHistory"  onclick="switchTab('history')"  style="flex:1;padding:7px;background:transparent;color:var(--text-dim);border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;">📋 Log</button>
    </div>
    <button class="tl-log-close" onclick="closeTlLog()">×</button>
  </div>
  <div class="tl-log-body" id="tlLogBody"></div>
</div>


<div class="api-overlay" id="apiOverlay">
  <div class="api-card">
    <div class="logo-dot" style="width:10px;height:10px"></div>
    <div class="api-title">Claude Rijassistent</div>
    <div class="api-sub">Voer je Anthropic API-sleutel in om te starten. Deze wordt lokaal opgeslagen in je browser.</div>
    <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." onkeydown="if(event.key==='Enter')saveApiKey()" />
    <button class="api-btn" onclick="saveApiKey()">Starten →</button>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <div class="logo-text">Claude <span>/ rijmodus</span></div>
  </div>
  <div class="header-right">
    <div class="tl-log-badge">
      <button class="outlook-btn" id="tlBtn" onclick="toggleTeamleader()">🔗 Teamleader</button>
      <span class="tl-log-badge-count" id="tlLogBadge"></span>
    </div>
    <button class="outlook-btn" id="outlookBtn" onclick="toggleOutlook()">🔗 Outlook</button>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="statusText">gereed</span>
    </div>
  </div>
</div>

<div class="conversation" id="conversation">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎙️</div>
    <div class="empty-title">Klaar om te luisteren</div>
    <div class="empty-sub">Druk de knop in en spreek je opdracht. Claude antwoordt via de speakers.</div>
  </div>
</div>

<div class="controls">
  <div class="waveform" id="waveform">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggleListening()">
    <span class="mic-icon" id="micIcon">🎙️</span>
  </button>

  <div class="mic-hint" id="micHint">Druk om te spreken</div>

  <div class="approval-panel" id="approvalPanel">
    <div class="approval-label">Wachten op bevestiging</div>
    <div class="approval-action" id="approvalAction"></div>
    <div class="approval-details" id="approvalDetails"></div>
    <div class="approval-btns">
      <button class="approval-btn ok"   onclick="resolveApproval('ok')">✅ Uitvoeren</button>
      <button class="approval-btn nok"  onclick="resolveApproval('nok')">❌ Annuleren</button>
      <button class="approval-btn edit" onclick="resolveApproval('edit')">✏️ Aanpassen</button>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="bottom-bar-btn approval" onclick="openTlLog('approval')">⏳ Goedkeuringen <span id="logBottomBadge"></span></button>
    <button class="bottom-bar-btn history" onclick="openTlLog('history')">📋 Log</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.1/lib/msal-browser.min.js"></script>
<script>
  // ── Actie-log (Teamleader + Outlook) ────────────────────
  const ACTION_LOG_KEY = 'action_log';

  function logLoad() {
    try { return JSON.parse(localStorage.getItem(ACTION_LOG_KEY) || '[]'); } catch { return []; }
  }
  function logSave(entries) { localStorage.setItem(ACTION_LOG_KEY, JSON.stringify(entries)); }

  function logAdd(category, action, details, undoData) {
    const entries = logLoad();
    entries.unshift({ id: Date.now(), category, action, details, undoData, ts: new Date().toISOString(), undone: false, _executed: true, status: 'ok' });
    logSave(entries);
    renderLog();
  }

  function logAddFailed(toolName, input, errorMsg, errorDetails) {
    const entries = logLoad();
    const label = TOOL_LABELS[toolName] || toolName;
    entries.unshift({
      id: Date.now(), category: 'Fout', action: label,
      details: { ...input, '⚠ Fout': errorMsg, ...(errorDetails ? { 'Details': errorDetails } : {}) },
      undoData: null, ts: new Date().toISOString(), undone: false, _executed: true, status: 'failed'
    });
    logSave(entries);
    renderLog();
  }

  let activeTab = 'approval';
  function openTlLog(tab = 'approval') {
    activeTab = tab;
    document.getElementById('tlLogPanel').classList.add('open');
    document.getElementById('tlLogOverlay').style.display = 'block';
    switchTab(tab);
  }
  function closeTlLog() {
    document.getElementById('tlLogPanel').classList.remove('open');
    document.getElementById('tlLogOverlay').style.display = 'none';
  }
  function switchTab(tab) {
    activeTab = tab;
    const aBtn = document.getElementById('tabApproval');
    const hBtn = document.getElementById('tabHistory');
    if (aBtn) { aBtn.style.background = tab === 'approval' ? 'var(--accent)' : 'transparent'; aBtn.style.color = tab === 'approval' ? '#fff' : 'var(--text-dim)'; }
    if (hBtn) { hBtn.style.background = tab === 'history'  ? 'var(--blue)'   : 'transparent'; hBtn.style.color = tab === 'history'  ? '#fff' : 'var(--text-dim)'; }
    tab === 'approval' ? renderLog() : renderHistory();
  }

  function renderHistory() {
    const entries = logLoad();
    const body = document.getElementById('historyBody');
    const done = entries.filter(e => e.undone || e._executed);
    if (!done.length) { body.innerHTML = '<div class="tl-log-empty">Nog geen uitgevoerde acties.</div>'; return; }
    body.innerHTML = done.map(e => {
      const color = CATEGORY_COLOR[e.category] || 'var(--text-dim)';
      const detailLines = Object.entries(e.details || {}).filter(([,v]) => v)
        .map(([k,v]) => `<span style="color:var(--text-dim)">${k}:</span> ${v}`).join('<br>');
      return `
      <div class="tl-log-entry" id="histentry-${e.id}">
        <div class="tl-log-entry-top">
          <div class="tl-log-entry-info">
            <div class="tl-log-action" style="color:${color}">[${e.category}] ${e.action}</div>
            <div class="tl-log-desc" style="margin-top:4px;line-height:1.6;font-size:11px">${detailLines}</div>
          </div>
          <div class="tl-log-time">${new Date(e.ts).toLocaleString('nl-BE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        ${e.undoData && !e.undone ? `<button class="tl-log-undo" onclick="logUndo(${e.id}); renderHistory();">↩ Ongedaan maken</button>` : ''}
        ${e.undone ? `<div style="color:var(--text-dim);font-size:11px;margin-top:6px;">✓ Ongedaan gemaakt</div>` : ''}
        ${!e.undoData ? `<div style="color:var(--text-dim);font-size:10px;margin-top:6px;">Niet omkeerbaar</div>` : ''}
      </div>`;
    }).join('');
  }

  const CATEGORY_COLOR = { Teamleader: '#e8622a', Outlook: '#4a9eff', Fout: '#ff4444' };

  const TOOL_LABELS = {
    tl_create_contact:    'Contact aanmaken in Teamleader',
    tl_create_company:    'Bedrijf aanmaken in Teamleader',
    create_calendar_event:'Afspraak aanmaken',
    delete_calendar_event:'Afspraak verwijderen',
    send_email:           'E-mail versturen',
    archive_email:        'E-mail archiveren',
  };

  // ── Approval flow ────────────────────────────────────────
  const WRITE_TOOLS = new Set([
    'create_calendar_event','delete_calendar_event','send_email','archive_email',
    'tl_create_contact','tl_create_company'
  ]);

  let approvalResolve = null;

  const CONTACT_FIELD_LABELS = {
    first_name: 'Voornaam', last_name: 'Achternaam', email: 'E-mail',
    phone: 'Telefoon', mobile: 'GSM', function_title: 'Functie', company_id: 'Bedrijf'
  };
  const CONTACT_REQUIRED_FIELDS = ['first_name','last_name','email'];
  const CONTACT_ALL_FIELDS = ['first_name','last_name','email','phone','mobile','function_title','company_id'];

  function requestApproval(toolName, input) {
    return new Promise(resolve => {
      approvalResolve = resolve;
      const panel = document.getElementById('approvalPanel');
      document.getElementById('approvalAction').textContent = TOOL_LABELS[toolName] || toolName;

      let html = '';
      if (toolName === 'tl_create_contact') {
        html = CONTACT_ALL_FIELDS.map(f => {
          const label = CONTACT_FIELD_LABELS[f] || f;
          const val = input[f];
          const required = CONTACT_REQUIRED_FIELDS.includes(f);
          const display = val || `<span style="color:#ff6b6b;font-style:italic">${required ? '⚠ Verplicht — ontbreekt' : 'Niet gevonden'}</span>`;
          return `<div style="display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim);min-width:90px">${label}</span><span>${display}</span></div>`;
        }).join('');
      } else {
        html = Object.entries(input)
          .filter(([,v]) => v !== undefined && v !== '')

  function renderLog() {
    const entries = logLoad();
    const body = document.getElementById('tlLogBody');
    const badge = document.getElementById('tlLogBadge');
    const bottomBadge = document.getElementById('logBottomBadge');
    const active = entries.filter(e => !e.undone).length;
    const hasFailed = entries.some(e => e.status === 'failed');

    // Teller badge (header)
    badge.textContent = active > 0 ? ` (${active})` : '';

    // Onderste Log-knop: ! bij fouten, anders teller
    if (bottomBadge) {
      if (hasFailed) {
        bottomBadge.textContent = '!';
        bottomBadge.style.background = '#ff4444';
      } else {
        bottomBadge.textContent = active > 0 ? String(active) : '';
        bottomBadge.style.background = '';
      }
      bottomBadge.style.display = (hasFailed || active > 0) ? 'inline-flex' : 'none';
    }

    if (!entries.length) { body.innerHTML = '<div class="tl-log-empty">Nog geen acties geregistreerd.</div>'; return; }
    body.innerHTML = entries.map(e => {
      const failed = e.status === 'failed';
      const color = failed ? '#ff4444' : (CATEGORY_COLOR[e.category] || 'var(--text-dim)');
      const icon = failed ? '⚠ ' : '';
      const detailLines = Object.entries(e.details || {})
        .filter(([,v]) => v)
        .map(([k,v]) => `<span style="color:${k.startsWith('⚠') ? '#ff4444' : 'var(--text-dim)'}">${k}:</span> <span style="color:${k.startsWith('⚠') ? '#ff9999' : 'inherit'}">${v}</span>`)
        .join('<br>');
      return `
      <div class="tl-log-entry" id="logentry-${e.id}" style="${failed ? 'border-left:3px solid #ff4444;padding-left:8px;' : ''}">
        <div class="tl-log-entry-top">
          <div class="tl-log-entry-info">
            <div class="tl-log-action" style="color:${color}">${icon}[${e.category}] ${e.action}</div>
            <div class="tl-log-desc" style="margin-top:4px;line-height:1.6;font-size:11px">${detailLines}</div>
          </div>
          <div class="tl-log-time">${new Date(e.ts).toLocaleString('nl-BE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        ${e.undoData && !e.undone ? `<button class="tl-log-undo" onclick="logUndo(${e.id})">↩ Ongedaan maken</button>` : ''}
        ${e.undone ? `<div style="color:var(--text-dim);font-size:11px;margin-top:6px;">✓ Ongedaan gemaakt</div>` : ''}
        ${!failed && !e.undoData && !e.undone ? `<div style="color:var(--text-dim);font-size:10px;margin-top:6px;">Niet omkeerbaar</div>` : ''}
      </div>`;
    }).join('');
  }

  async function logUndo(id) {
    const entries = logLoad();
    const entry = entries.find(e => e.id === id);
    if (!entry || entry.undone) return;
    const btn = document.querySelector(`#logentry-${id} .tl-log-undo`);
    if (btn) { btn.disabled = true; btn.textContent = 'Bezig...'; }
    try {
      const u = entry.undoData;
      if (u.type === 'tl_contact')  await tlFetch(`/api/contacts/${u.id}`, { method: 'DELETE' });
      if (u.type === 'tl_company')  await tlFetch(`/api/companies/${u.id}`, { method: 'DELETE' });
      if (u.type === 'outlook_event') await graphCall(`/me/events/${u.id}`, 'DELETE');
      if (u.type === 'outlook_archive') await graphCall(`/me/messages/${u.id}/move`, 'POST', { destinationId: 'inbox' });
      entry.undone = true;
      logSave(entries);
      renderLog();
      showToast('Actie ongedaan gemaakt.');
    } catch (err) {
      if (btn) { btn.disabled = false; btn.textContent = '↩ Ongedaan maken'; }
      showToast('Fout bij ongedaan maken: ' + err.message);
    }
  }

  async function tlFetch(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', 'x-tl-user': TL_USER, ...(options.headers || {}) };
    const res = await fetch(`${TL_PROXY}${path}`, { ...options, headers });
    const data = await res.json();
    if (res.status === 401 && data.loginUrl) {
      window.open(`${TL_PROXY}${data.loginUrl}`, '_blank');
      throw new Error('Teamleader login vereist — log in via het geopende venster en probeer opnieuw.');
    }
    if (!res.ok) throw new Error(data.error || `TL fout ${res.status}`);

  async function toolSuggestContactsFromEmail({ count = 50, company = '' }) {
    // Zoek e-mails — filter op bedrijfsdomein als opgegeven
    let url;
    if (company) {
      url = `/me/messages?$top=${count}&$select=subject,from,receivedDateTime&$search="${company}"`;
    } else {
      url = `/me/messages?$top=${count}&$orderby=receivedDateTime desc&$select=subject,from,receivedDateTime`;
    }
    const data = await graphCall(url);
    if (!data?.value?.length) return 'Geen e-mails gevonden.';

    // Unieke externe afzenders
    const seen = new Set();
    const senders = [];
    for (const msg of data.value) {
      const addr = msg.from?.emailAddress?.address?.toLowerCase() || '';
      const name = msg.from?.emailAddress?.name || '';
      if (!addr || seen.has(addr)) continue;
      if (addr.includes('noreply') || addr.includes('no-reply')) continue;
      if (addr.includes('@nivosystems') || addr.includes('@nivo')) continue;
      seen.add(addr);
      senders.push({ name, email: addr });
    }
    if (!senders.length) return 'Geen relevante afzenders gevonden.';

    // Check welke al in Teamleader staan (zoek op e-mail EN op naam)
    const nieuw = [];
    for (const s of senders) {
      try {
        const byEmail = await tlFetch(`/api/contacts/search?q=${encodeURIComponent(s.email)}`);
        if (byEmail.length) continue; // al gevonden via e-mail
        const byName = await tlFetch(`/api/contacts/search?q=${encodeURIComponent(s.name)}`);
        const nameMatch = byName.some(c => {
          const tlName = c.name?.toLowerCase() || '';
          const sName = s.name?.toLowerCase() || '';
          return tlName === sName || tlName.includes(sName) || sName.includes(tlName);
        });
        if (!nameMatch) nieuw.push({ ...s, domain: s.email.split('@')[1] || '' });
      } catch { /* skip */ }
    }

    if (!nieuw.length) return `Alle gevonden afzenders${company ? ' van ' + company : ''} staan al in Teamleader.`;
    const listText = nieuw.map((c, i) => `${i+1}. ${c.name} — ${c.email}`).join('\n');
    return `TOON DEZE LIJST LETTERLIJK AAN DE GEBRUIKER (niet samenvatten):\n${listText}\n\nVraag: welke wil je toevoegen? (zeg een naam of nummer)`;
  }

  async function getGraphToken() {
    if (!msalInstance || !msalAccount) return null;
    try {
      const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: msalAccount });
      return r.accessToken;
    } catch {
      await msalInstance.acquireTokenRedirect({ scopes: SCOPES, account: msalAccount });
      return null;
    }
  }

  async function graphCall(endpoint, method = 'GET', body = null) {
    const token = await getGraphToken();
    if (!token) throw new Error('Niet verbonden met Outlook');
    const opts = { method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, opts);
    if (!res.ok) throw new Error(`Graph fout ${res.status}`);
    if (res.status === 204) return null;
    return res.json();
  }

  async function toolGetEmails({ count = 5, unread_only = false, from = '', subject = '', include_body = false }) {
    const filters = [];
    if (unread_only) filters.push('isRead eq false');
    // Zoek op naam OF e-mailadres via twee aparte calls als nodig
    if (from) {
      // Graph API staat geen 'or' toe in $filter bij berichten — zoek via $search of twee velden apart
      // Gebruik $search voor betere naam-zoekresultaten
    }
    if (subject) filters.push(`contains(subject,'${subject}')`);
    const select = include_body ? 'subject,from,receivedDateTime,isRead,body' : 'subject,from,receivedDateTime,isRead,bodyPreview';
    let url;
    if (from) {
      // $search en $orderby zijn niet combineerbaar in Graph API
      // Gebruik gewone zoekterm — Graph zoekt in afzender, onderwerp en body
      url = `/me/messages?$top=${count}&$select=${select}&$search="${from.replace(/"/g, '')}"`;
    } else {
      url = `/me/messages?$top=${count}&$orderby=receivedDateTime desc&$select=${select}`;
      if (filters.length) url += '&$filter=' + encodeURIComponent(filters.join(' and '));
    }
    const data = await graphCall(url);
    if (!data?.value?.length) return 'Geen e-mails gevonden.';
    return data.value.map(e => {
      const bodyText = include_body
        ? '\n  INHOUD:\n' + (e.body?.content || '')
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<\/p>/gi, '\n')
            .replace(/<[^>]+>/g, '')
            .replace(/&nbsp;/g, ' ')
            .replace(/&amp;/g, '&')
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .replace(/\s*\n\s*/g, '\n')
            .trim()
            .substring(0, 2000)
        : '\n  ' + (e.bodyPreview || '').substring(0, 100) + '…';
      return `• Van: ${e.from.emailAddress.name} <${e.from.emailAddress.address}>\n  Onderwerp: ${e.subject}${e.isRead ? '' : ' [ongelezen]'}\n  Datum: ${new Date(e.receivedDateTime).toLocaleString('nl-BE')}${bodyText}`;
    }).join('\n\n');
  }

  async function executeTool(name, input) {
    // Schrijf-acties vragen eerst goedkeuring
    if (WRITE_TOOLS.has(name)) {
      const decision = await requestApproval(name, input);
      if (decision === 'nok') return 'De gebruiker heeft deze actie geannuleerd.';
      if (decision === 'edit') {
        // Activeer mic zodat gebruiker aanpassingen kan inspreken
        showToast('Spreek je aanpassing in...');
        const correction = await new Promise(resolve => {
          const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
          rec.lang = 'nl-NL'; rec.interimResults = false;
          rec.onresult = e => resolve(e.results[0][0].transcript);
          rec.onerror = () => resolve('');
          rec.start();
        });
        if (correction) {
          return `De gebruiker wil de volgende aanpassing: "${correction}". Pas de actie aan en stel opnieuw voor.`;
        }
        return 'De gebruiker heeft geen aanpassing ingesproken. Probeer opnieuw.';
      }
      // decision === 'ok' → verder met uitvoering, vang fouten op en log ze
      try {
        const result = await executeToolDirect(name, input);
        return result;
      } catch (err) {
        const errMsg = err?.message || String(err);
        const errDetails = err?.details ? JSON.stringify(err.details).substring(0, 200) : '';
        logAddFailed(name, input, errMsg, errDetails);
        throw err;
      }
    }
    return executeToolDirect(name, input);
  }

  function executeToolDirect(name, input) {
    switch (name) {
      case 'get_calendar_events':       return toolGetCalendarEvents(input);
      case 'delete_calendar_event':     return toolDeleteCalendarEvent(input);
      case 'create_calendar_event':     return toolCreateCalendarEvent(input);
      case 'get_emails':                return toolGetEmails(input);
      case 'tl_search_contacts':        return toolTlSearchContacts(input);
      case 'tl_create_contact':         return toolTlCreateContact(input);
      case 'tl_search_companies':       return toolTlSearchCompanies(input);
      case 'tl_create_company':         return toolTlCreateCompany(input);
      case 'tl_search_projects':        return toolTlSearchProjects(input);
      case 'tl_get_company_contacts':   return toolTlGetCompanyContacts(input);
      case 'suggest_contacts_from_email': return toolSuggestContactsFromEmail(input);
      case 'archive_email':             return toolArchiveEmail(input);
      case 'send_email':                return toolSendEmail(input);
      default: throw new Error(`Onbekend tool: ${name}`);
    }
  }

  // ── Claude tools schema ─────────────────────────────────
  const CLAUDE_TOOLS = [

  // ── Speech ──────────────────────────────────────────────
  let silenceTimer = null;
  const SILENCE_MS = 2200; // wacht 2.2s stilte voor verzenden

  function setupRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('Spraakherkenning niet beschikbaar'); return null; }
    const r = new SR();
    r.lang = 'nl-NL';
    r.continuous = true;
    r.interimResults = true;
    let finalTranscript = '';

    r.onresult = (e) => {
      clearTimeout(silenceTimer);
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
        else interim = e.results[i][0].transcript;
      }
      // Na SILENCE_MS stilte → verwerk
      silenceTimer = setTimeout(() => {
        const text = (finalTranscript + interim).trim();
        if (text) { stopListening(); handleUserInput(text); }
      }, SILENCE_MS);
    };
    r.onerror = (e) => { stopListening(); if (e.error !== 'aborted' && e.error !== 'no-speech') showToast('Fout: ' + e.error); };
    r.onend   = () => { if (isListening) { try { r.start(); } catch {} } }; // herstart bij auto-stop
    return r;
  }

  function toggleListening() {
    if (isProcessing) return;
    isListening ? stopListening() : startListening();
  }

  function startListening() {
    window.speechSynthesis && window.speechSynthesis.cancel();
    recognition = setupRecognition();
    if (!recognition) return;
    isListening = true;
    recognition.start();
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micHint').classList.add('active');
    document.getElementById('micHint').textContent = 'Luisteren… druk om te stoppen';
    document.getElementById('waveform').classList.add('active');
    document.getElementById('micIcon').textContent = '⏹️';
    document.getElementById('statusText').textContent = 'luisteren';
  }

  function stopListening() {
    isListening = false;
    clearTimeout(silenceTimer);
    if (recognition) { recognition.abort(); recognition = null; }
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micHint').classList.remove('active');
    document.getElementById('micHint').textContent = 'Druk om te spreken';
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('micIcon').textContent = '🎙️';
    document.getElementById('statusText').textContent = 'gereed';
  }

  function setProcessing(val) {
    isProcessing = val;
    const btn  = document.getElementById('micBtn');
    const icon = document.getElementById('micIcon');
    const hint = document.getElementById('micHint');
    if (val) {
      btn.classList.add('processing');
      icon.textContent = '⚙️';
      hint.textContent = 'Nadenken…';
      document.getElementById('statusText').textContent = 'verwerken';
    } else {
      btn.classList.remove('processing');
      icon.textContent = '🎙️';
      hint.textContent = 'Druk om te spreken';
      document.getElementById('statusText').textContent = 'gereed';
    }
  }

  // ── Claude with tool-use loop ───────────────────────────
  async function handleUserInput(text) {
    if (!text.trim()) return;
    hideEmptyState();
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    // Houd geschiedenis beperkt zodat de context niet te groot wordt
    if (conversationHistory.length > 30) conversationHistory = conversationHistory.slice(-20);
    setProcessing(true);
    const thinkingEl = addThinking();

    const today = new Date().toLocaleDateString('nl-BE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const outlookStatus = msalAccount ? 'De gebruiker is verbonden met Outlook.' : 'De gebruiker is NIET verbonden met Outlook — als hij agenda of e-mail wil, vraag hem dan op de Outlook-knop te klikken.';
    const tlStatus = tlConnected ? 'De gebruiker is verbonden met Teamleader (CRM). Je kan contacten en bedrijven zoeken of aanmaken, en projecten opzoeken.' : 'De gebruiker is NIET verbonden met Teamleader — als hij CRM-acties wil uitvoeren, vraag hem dan op de Teamleader-knop te klikken.';

    try {
      let messages = [...conversationHistory];

      // Tool-use loop: max 5 rondes
      for (let round = 0; round < 5; round++) {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1024,
            system: `Je bent een vriendelijke rijassistent in een Tesla. De gebruiker spreekt je aan terwijl hij rijdt. Antwoorden zijn altijd: kort (max 3 zinnen), direct bruikbaar, en in het Nederlands. Gebruik NOOIT markdown-opmaak zoals **, *, #, of backticks — schrijf altijd gewone platte tekst. Geen lange lijsten. Bevestig een actie ALLEEN nadat je de bijhorende tool hebt aangeroepen en een resultaat hebt gekregen. Stel één vervolgvraag als iets onduidelijk is. Vandaag is het ${today}. ${outlookStatus} ${tlStatus}

Werkwijze contacten toevoegen: gebruik suggest_contacts_from_email (met company filter indien van toepassing). De tool geeft een genummerde lijst — kopieer die lijst LETTERLIJK in je antwoord, voeg niets samen, vat niets samen. Als de gebruiker daarna "ja" of een naam of nummer zegt, voeg dan DIE persoon toe — zoek NIET opnieuw in e-mails tenzij je de handtekening nog nodig hebt. Gebruik get_emails met include_body:true alleen om extra gegevens (telefoon, functie) op te halen van de gekozen persoon. Gebruik tl_search_companies om de company_id (UUID) op te zoeken — stuur nooit de bedrijfsnaam als company_id. Een contact mag je ALLEEN aanmaken met minstens naam EN e-mailadres. Telefoonnummer en functie zijn sterk gewenst.`,
            tools: CLAUDE_TOOLS,
            messages
          })
        });

        const data = await response.json();
        if (data.error) { showToast(data.error.message || 'API fout'); break; }

        // Geen tool calls — eindantwoord
        if (data.stop_reason !== 'tool_use') {
          const reply = stripMarkdown(data.content.find(c => c.type === 'text')?.text || '');
          conversationHistory.push({ role: 'assistant', content: reply });
          thinkingEl.remove();
          addMessage('assistant', reply);
          speak(reply);
          break;
        }

        // Tool calls uitvoeren
        const assistantContent = data.content;
        messages.push({ role: 'assistant', content: assistantContent });

        const toolResults = [];
        for (const block of assistantContent) {
          if (block.type !== 'tool_use') continue;
          let result;
          try {
            result = await executeTool(block.name, block.input);
          } catch (err) {
            result = `Fout: ${err.message}`;
          }
          toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: result });
        }
        messages.push({ role: 'user', content: toolResults });
      }
    } catch (err) {
      thinkingEl.remove();
      const msg = err?.message || String(err);
      if (msg.includes('rate') || msg.includes('overloaded') || msg.includes('529') || msg.includes('529')) {
        addMessage('assistant', 'Te veel verzoeken in korte tijd. Ik verwijder de oudste berichten en probeer opnieuw — spreek je vraag nog eens in.');
        if (conversationHistory.length > 6) conversationHistory = conversationHistory.slice(-6);
      } else {
        showToast('Verbindingsfout — ' + msg.substring(0, 80));
      }
    }

    setProcessing(false);
  }

  function stripMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .replace(/_{1,2}(.+?)_{1,2}/g, '$1')
      .replace(/`(.+?)`/g, '$1')
      .replace(/#{1,6}\s/g, '')
      .trim();
  }

  function sendQuick(text) { handleUserInput(text); }

  // ── TTS ─────────────────────────────────────────────────
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'nl-NL';
    utt.rate = 1.05;
    const nlVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('nl'));
    if (nlVoice) utt.voice = nlVoice;
    window.speechSynthesis.speak(utt);
  }

  // ── UI helpers ──────────────────────────────────────────
  function extractOptions(text) {
    // Detecteer genummerde lijst (1. ... 2. ...) of bullet lijst (• ...)
    const numbered = [...text.matchAll(/^\s*(\d+)[.)]\s+(.+)/gm)].map(m => m[2].trim());
    if (numbered.length >= 2) return numbered;
    const bullets = [...text.matchAll(/^\s*[•\-\*]\s+(.+)/gm)].map(m => m[1].trim());
    if (bullets.length >= 2) return bullets;
    return [];
  }

  function addMessage(role, text) {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'jij' : 'claude';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(label);
    div.appendChild(bubble);

    // Voeg klikbare chips toe als Claude opties geeft
    if (role === 'assistant') {
      const options = extractOptions(text);
      if (options.length) {
        const chips = document.createElement('div');
        chips.className = 'option-chips';
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-chip';
          // Toon enkel het eerste deel (voor lange regels)
          btn.textContent = opt.length > 50 ? opt.substring(0, 48) + '…' : opt;
          btn.onclick = () => {
            if (btn.disabled) return;
            chips.querySelectorAll('.option-chip').forEach(b => b.disabled = true);
            chips.style.opacity = '0.4';
            chips.remove();
            handleUserInput(opt);
          };
          chips.appendChild(btn);
        });
        div.appendChild(chips);
      }
    }

    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
    return div;
  }

  function addThinking() {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'message assistant';
    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'claude';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const dots = document.createElement('div');
    dots.className = 'thinking-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(dots);
    div.appendChild(label);
    div.appendChild(bubble);
    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
    return div;
  }

  function hideEmptyState() {
    const el = document.getElementById('emptyState');
    if (el) el.remove();
  }

  function clearConversation() {
    window.speechSynthesis && window.speechSynthesis.cancel();
    conversationHistory = [];
    document.getElementById('conversation').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎙️</div>
        <div class="empty-title">Klaar om te luisteren</div>
        <div class="empty-sub">Druk de knop in en spreek je opdracht. Claude antwoordt via de speakers.</div>
      </div>`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  window.speechSynthesis && (window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices());

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      toggleListening();
    }
  });
</script>
